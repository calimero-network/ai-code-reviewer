# AI Code Reviewer Configuration
# Copy this file to config.yaml and set your API keys

version: 1

# ============================================================================
# ANTHROPIC API — unified LLM gateway via the official Messages API
# ============================================================================
anthropic:
  api_key: ${ANTHROPIC_API_KEY}
  # base_url: https://api.anthropic.com   # default
  default_model: claude-opus-4-6
  timeout_seconds: 300
  max_retries: 3
  enable_prompt_caching: true
  max_combined_context_tokens: 150000
  per_file_max_bytes: 524288
  per_review_github_request_budget: 200

# ============================================================================
# GITHUB INTEGRATION
# ============================================================================
github:
  # Option 1: Personal Access Token (simpler, good for testing)
  token: ${GITHUB_TOKEN}

  # Option 2: GitHub App (recommended for production/organization use)
  # app_id: ${GITHUB_APP_ID}
  # private_key_path: ./github-app.pem
  # webhook_secret: ${GITHUB_WEBHOOK_SECRET}

# ============================================================================
# AGENT CONFIGURATION
# ============================================================================
# Diversity comes from model mix (Opus vs Sonnet), system prompts,
# focus areas, and extended thinking.

agents:
  # Reasoning-heavy: Opus + extended thinking
  - name: security-reviewer
    model: claude-opus-4-6
    focus_areas:
      - security
      - authentication
      - data_validation
    description: "Identifies security vulnerabilities and auth issues"
    max_tokens: 16384
    temperature: 0.2
    thinking_enabled: true
    thinking_budget_tokens: 8192
    allow_tool_use: true
    max_tool_calls: 20

  - name: patterns-reviewer
    model: claude-opus-4-6
    focus_areas:
      - consistency
      - patterns
      - architecture
      - breaking_changes
    description: "Ensures code follows existing patterns; explores repo via tools"
    max_tokens: 16384
    temperature: 0.2
    thinking_enabled: true
    thinking_budget_tokens: 8192
    allow_tool_use: true
    max_tool_calls: 30

  - name: logic-reviewer
    model: claude-opus-4-6
    focus_areas:
      - logic
      - edge_cases
      - error_handling
      - correctness
    max_tokens: 16384
    temperature: 0.2
    thinking_enabled: true
    thinking_budget_tokens: 8192
    allow_tool_use: true
    max_tool_calls: 20

  # Broad/fast: Sonnet without thinking
  - name: performance-reviewer
    model: claude-sonnet-4-6
    focus_areas:
      - performance
      - complexity
      - resource_management
    description: "Finds performance bottlenecks and inefficiencies"
    max_tokens: 8192
    temperature: 0.3
    thinking_enabled: false
    allow_tool_use: true
    max_tool_calls: 10

  - name: style-reviewer
    model: claude-sonnet-4-6
    focus_areas:
      - style
      - documentation
      - readability
    max_tokens: 8192
    temperature: 0.3
    thinking_enabled: false
    allow_tool_use: false

# ============================================================================
# ORCHESTRATOR SETTINGS
# ============================================================================
orchestrator:
  timeout_seconds: 300
  min_agents_required: 2
  max_parallel_agents: 5
  retry_on_failure: true
  max_retries: 2

# ============================================================================
# AGGREGATOR SETTINGS
# ============================================================================
aggregator:
  similarity_threshold: 0.85
  min_consensus_for_critical: 0.5
  use_embeddings: true
  embedding_model: all-MiniLM-L6-v2

# ============================================================================
# OUTPUT SETTINGS
# ============================================================================
output:
  include_agent_breakdown: true
  include_confidence_scores: true
  max_findings_per_file: 10
  max_total_findings: 50

# ============================================================================
# REVIEW POLICY
# ============================================================================
review_policy:
  auto_approve_if_no_findings: false
  block_on_critical: true
  require_human_review_for:
    - security
  ignore_patterns:
    - "**/*.lock"
    - "**/*.generated.*"
    - "**/vendor/**"
    - "**/node_modules/**"
    - "**/__pycache__/**"

# ============================================================================
# SERVER SETTINGS (for webhook mode)
# ============================================================================
server:
  host: "0.0.0.0"
  port: 8080
  health_check_path: /health
  metrics_path: /metrics
  metrics_enabled: true

# ============================================================================
# DOCUMENTATION REVIEW
# ============================================================================
doc_review:
  enabled: true
  architecture_paths:
    - "architecture/"
    - "docs/"
    - "doc/"
    - "docs-static/"
  convention_files:
    - "AGENTS.md"
    - "CLAUDE.md"
    - "CONTRIBUTING.md"
    - ".cursor/rules/README.md"
  comment_marker: "<!-- AI-CODE-REVIEWER-DOC-BOT -->"

# ============================================================================
# DOCUMENTATION DRAFT GENERATION
# ============================================================================
# When enabled, the doc reviewer calls Claude Sonnet to:
#   1. Generate full-file updates for stale Markdown docs (source_to_docs_mapping).
#   2. Scan static HTML doc directories (docs/ or docs-static/) and update any
#      pages that are made inaccurate by the merged PR.
# On merge to main/master a new DRAFT PR is opened with the changes for human
# review — nothing is auto-merged.
#
# Disabled by default. Enable per-repo in .ai-reviewer.yaml.
doc_generation:
  enabled: false
  model: claude-sonnet-4-6   # Sonnet is sufficient for prose/HTML drafting
  max_files: 15              # max Claude calls per run (HTML pages + Markdown)

  # Directories containing static HTML GitHub Pages docs.
  # update-docs will scan these for .html files and update stale pages on merge.
  static_docs_dirs:
    - "docs/"
    - "docs-static/"

  # Labels applied to the auto-generated doc update PR.
  pr_labels:
    - "automated-docs"
    - "documentation"

  # Open the doc PR as a draft so it doesn't appear ready to merge immediately.
  pr_draft: true

# ============================================================================
# LOGGING
# ============================================================================
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
